services:
  backend:
    build:
      context: ./app/backend
      dockerfile: Dockerfile
    container_name: app-duty-backend
    ports:
      - "8000:8000"
    volumes:
      - ./app/backend:/app
      - backend-data:/app/data
    environment:
      - DATABASE_URL=sqlite+aiosqlite:///./test.db
      - ENV=development
      - DEBUG=true
    restart: always

  frontend:
    build:
      context: ./app/frontend
      dockerfile: Dockerfile
    container_name: app-duty-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    restart: always

volumes:
  backend-data:
